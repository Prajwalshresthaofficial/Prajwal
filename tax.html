<body x-data="taxCalculator()" class="bg-[#0f172a] text-slate-200">

    <nav class="fixed top-0 w-full z-50 glass-card !rounded-none border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl font-bold text-blue-400">PR.</span>
            </div>
            <div class="flex gap-8">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="tax.html" class="nav-link active">Tax Tool</a>
            </div>
        </div>
    </nav>

    <section class="py-32 max-w-6xl mx-auto px-6">
        <div class="grid lg:grid-cols-3 gap-8 items-start">
            
            <div class="lg:col-span-2 glass-card p-10 space-y-8 fade-up">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <h2 class="text-2xl font-bold text-white">Share Calculator</h2>
                    
                    <div class="flex items-center gap-3">
                        <button @click="clearFields()" 
                                class="px-4 py-2 border border-slate-700 rounded-xl text-[10px] font-bold text-slate-400 hover:bg-slate-800 hover:text-white transition-all uppercase tracking-widest">
                            Clear
                        </button>

                        <div class="flex bg-[#1e293b] p-1 rounded-xl border border-slate-700">
                            <button @click="mode = 'buy'" 
                                    :class="mode === 'buy' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'" 
                                    class="px-6 py-2 rounded-lg text-xs font-bold transition-all duration-300">BUY</button>
                            <button @click="mode = 'sell'" 
                                    :class="mode === 'sell' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'" 
                                    class="px-6 py-2 rounded-lg text-xs font-bold transition-all duration-300">SELL</button>
                        </div>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <div>
                        <label class="label-text">Quantity</label>
                        <input type="number" x-model.number="qty" placeholder="0" class="input-field">
                    </div>
                    
                    <div x-show="mode === 'sell'" x-transition>
                        <label class="label-text">Investor Type</label>
                        <select x-model="holding" class="input-field">
                            <option value="long">Individual: More than 1 Year (5%)</option>
                            <option value="short">Individual: Less than 1 Year (7.5%)</option>
                            <option value="institutional">Institutional (10%)</option>
                        </select>
                    </div>

                    <div>
                        <label class="label-text">Buy Price (Rs)</label>
                        <input type="number" x-model.number="buyPrice" placeholder="0.00" class="input-field">
                    </div>

                    <div x-show="mode === 'sell'" x-transition>
                        <label class="label-text">Sell Price (Rs)</label>
                        <input type="number" x-model.number="sellPrice" placeholder="0.00" class="input-field">
                    </div>
                </div>
            </div>

            <div class="bg-gradient-to-br from-blue-600 to-indigo-900 p-8 rounded-[2rem] shadow-2xl space-y-6 fade-up">
                <h3 class="font-bold border-b border-white/20 pb-4 text-white">Detailed Breakdown</h3>
                
                <div class="space-y-4 text-xs">
                    <div>
                        <div class="text-white/40 uppercase tracking-widest font-bold text-[10px] mb-2">Buy Side</div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-white/80"><span>Commission</span><span x-text="'Rs ' + results.buyComm"></span></div>
                            <div class="flex justify-between text-white/80"><span>SEBON Fee</span><span x-text="'Rs ' + results.buySebon"></span></div>
                            <div class="flex justify-between text-white font-bold text-sm pt-1"><span>Total Investment (WACC)</span><span x-text="'Rs ' + results.wacc"></span></div>
                        </div>
                    </div>
                    
                    <template x-if="mode === 'sell'">
                        <div class="pt-4 border-t border-white/10">
                            <div class="text-white/40 uppercase tracking-widest font-bold text-[10px] mb-2">Sell Side</div>
                            <div class="space-y-2">
                                <div class="flex justify-between text-white/80"><span>Commission</span><span x-text="'Rs ' + results.sellComm"></span></div>
                                <div class="flex justify-between text-white/80"><span>SEBON Fee</span><span x-text="'Rs ' + results.sellSebon"></span></div>
                                <div class="flex justify-between text-white/80"><span>DP Charge</span><span x-text="'Rs ' + results.dp"></span></div>
                                <div class="flex justify-between text-orange-300 font-bold"><span>Capital Gain Tax</span><span x-text="'Rs ' + results.cgt"></span></div>

                                <div class="pt-6 border-t border-white/20 mt-4">
                                    <span class="text-[10px] uppercase tracking-widest text-white/60 block mb-1">Total Amount Receivable (Rs)</span>
                                    <span class="text-3xl font-bold text-white tracking-tighter" x-text="'Rs ' + results.receivable"></span>
                                </div>
                                <div class="pt-2">
                                    <span class="text-[10px] uppercase tracking-widest text-white/60 block mb-1">Profit/Loss (Rs)</span>
                                    <span :class="results.isProfit ? 'text-emerald-300' : 'text-red-400'" 
                                          class="text-2xl font-bold" 
                                          x-text="'Rs ' + results.profit"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

        </div>
    </section>
    <footer class="py-12 border-t border-slate-800/50 text-center">
        <p class="footer-text">© Prajwal Shrestha 2026. <a href="terms.html" class="footer-link">T&C Applied</a></p>
    </footer>
